global
    log         127.0.0.1 local2
    maxconn     4000
    daemon

defaults
    mode                    tcp
    log                     global
    option                  tcplog
    option                  redispatch
    retries                 3
    timeout connect         10s
    timeout client          1m
    timeout server          1m

frontend okd_api
    bind *:6443
    default_backend okd_api_backend

backend okd_api_backend
    server sno-master 192.168.100.10:6443 check

frontend okd_mcs
    bind *:22623
    default_backend okd_mcs_backend

backend okd_mcs_backend
    server sno-master 192.168.100.10:22623 check

frontend okd_http
    bind *:80
    default_backend okd_http_backend

backend okd_http_backend
    server sno-master 192.168.100.10:80 check

frontend okd_https
    bind *:443
    default_backend okd_https_backend

backend okd_https_backend
    server sno-master 192.168.100.10:443 check

frontend stats
    bind *:9000
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:okdlab
