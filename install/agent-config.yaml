apiVersion: v1alpha1
kind: AgentConfig
metadata:
  name: sno
rendezvousIP: 192.168.241.10             # IP statique du nœud SNO sur VMnet8
hosts:
  - hostname: sno-master
    role: master
    interfaces:
      - name: ens33
        macAddress: "00:0C:29:xx:xx:xx"  # ← Remplacer avec la MAC réelle
                                          # VMware Workstation → VM Settings
                                          # → Network Adapter → Advanced → MAC Address
    networkConfig:
      interfaces:
        - name: ens33
          type: ethernet
          state: up
          ipv4:
            enabled: true
            dhcp: false
            address:
              - ip: 192.168.241.10
                prefix-length: 24
      dns-resolver:
        config:
          server:
            - 192.168.241.2              # Gateway VMnet8 (standard VMware NAT)
      routes:
        config:
          - destination: 0.0.0.0/0
            next-hop-address: 192.168.241.2
            next-hop-interface: ens33
