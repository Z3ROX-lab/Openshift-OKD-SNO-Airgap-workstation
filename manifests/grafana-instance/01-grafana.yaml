apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: grafana-operator
  labels:
    dashboards: grafana
spec:
  config:
    auth:
      disable_login_form: "false"
    auth.anonymous:
      enabled: "false"
    security:
      admin_user: admin
      admin_password: admin123!
  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana
              image: harbor.okd.lab/okd-mirror/grafana/grafana:latest
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 200m
                  memory: 512Mi
  route:
    spec:
      host: grafana.apps.sno.okd.lab
