# =============================================================================
# values.yaml — Helm values HashiCorp Vault (dev mode pour lab)
# =============================================================================
# Chart : hashicorp/vault v0.28.x (Vault 1.17.x)
# Mode : dev (stockage mémoire, auto-unseal, token root fixe)
#
# ⚠️  Mode dev uniquement pour le lab portfolio.
#     En production : mode HA avec Integrated Storage (Raft) +
#     auto-unseal via Azure Key Vault ou AWS KMS.
# =============================================================================
global:
  enabled: true
server:
  dev:
    enabled: true
    devRootToken: "root"   # Token fixe pour le lab — NE PAS UTILISER en prod
  authDelegator:
    enabled: false         # Désactivé pour ArgoCD namespaced mode
  # Route OKD via ingress
  ingress:
    enabled: false   # On utilise une Route OKD directement
  # Service Account pour l'auth Kubernetes
  serviceAccount:
    create: true
    name: vault
  # Resources adaptées au lab (SNO limité)
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
  # Readiness probe
  readinessProbe:
    enabled: true
    path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
  # Liveness probe
  livenessProbe:
    enabled: true
    path: /v1/sys/health?standbyok=true
    initialDelaySeconds: 60
ui:
  enabled: true
  serviceType: ClusterIP
# Agent Injector — désactivé pour ArgoCD namespaced mode
injector:
  enabled: false
