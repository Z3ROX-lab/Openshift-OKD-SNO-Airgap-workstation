---
# =============================================================================
# loki.yaml — ArgoCD Application : Loki Operator
# =============================================================================
# Installe Loki Operator v0.9.0 via OLM depuis catalog Harbor (airgap)
# Channel : alpha | CSV : loki-operator.v0.9.0
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: openshift-operators
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Z3ROX-lab/Openshift-OKD-SNO-Airgap-workstation
    targetRevision: HEAD
    path: manifests/loki
    directory:
      exclude: '{*.sh}'
  destination:
    server: https://kubernetes.default.svc
    namespace: loki-operator
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
