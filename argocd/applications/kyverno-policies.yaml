---
# =============================================================================
# kyverno-policies.yaml — ArgoCD Application : Kyverno Policies
# =============================================================================
# ClusterPolicies Kyverno — Supply Chain Security via Cosign
# Mode Audit (pas Enforce) — pour ne pas bloquer le lab
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies
  namespace: openshift-operators
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Z3ROX-lab/Openshift-OKD-SNO-Airgap-workstation
    targetRevision: HEAD
    path: manifests/kyverno-policies
    directory:
      exclude: '{*.sh}'
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
