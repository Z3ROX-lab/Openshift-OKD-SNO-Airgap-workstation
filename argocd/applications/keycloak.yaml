---
# =============================================================================
# keycloak.yaml — ArgoCD Application : Keycloak Operator + Instance
# =============================================================================
# Note : Keycloak a été installé initialement via OperatorHub avant ArgoCD.
#        Cette Application adopte les ressources existantes (syncPolicy manual)
#        et assure la cohérence GitOps pour les phases suivantes.
#
# Ressources gérées :
#   - manifests/keycloak/00-subscription.yaml       (OLM Subscription)
#   - manifests/keycloak/02-keycloak-instance.yaml  (CR Keycloak)
#   - manifests/keycloak/03-client-secret.yaml      (placeholder secret)
#
# Exclusions :
#   - 01-tls-secret.sh       → script shell, exécution manuelle
#   - 04-oauth-cluster.yaml  → ressource cluster-level
#   - 00-namespace.yaml      → ressource cluster-level
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: openshift-operators
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Z3ROX-lab/Openshift-OKD-SNO-Airgap-workstation
    targetRevision: HEAD
    path: manifests/keycloak
    directory:
      exclude: '{*.sh,03-client-secret.yaml,04-oauth-cluster.yaml,00-namespace.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
